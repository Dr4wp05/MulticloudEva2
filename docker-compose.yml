version: '3.8'

services:
  erp-database:
    build: ./database
    container_name: erp-database
    restart: always
    environment:
      POSTGRES_DB: farmacia_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    networks:
      - azul-net

  erp-frontend:
    build: ./frontend
    container_name: erp-frontend
    ports:
      - "80:80"
    environment:
      DB_HOST: erp-database
      DB_USER: admin
      DB_PASSWORD: admin_password
      DB_NAME: farmacia_db
    depends_on:
      - erp-database
    networks:
      - azul-net

networks:
  azul-net:
    driver: bridge
